<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JRPG Engine Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: monospace;
      color: #e0e0e0;
    }
    canvas { image-rendering: pixelated; border: 2px solid #444; }
    .controls {
      margin-top: 16px;
      text-align: center;
      font-size: 13px;
      line-height: 1.6;
      color: #999;
    }
    .controls kbd {
      background: #333;
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid #555;
      color: #ccc;
    }
    #dialogue-box {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 480px;
      background: rgba(0, 0, 20, 0.92);
      border: 2px solid #668;
      border-radius: 8px;
      padding: 16px 20px;
      font-size: 15px;
      line-height: 1.5;
      display: none;
    }
    #dialogue-box .speaker {
      color: #8cf;
      font-weight: bold;
      margin-bottom: 4px;
    }
    #dialogue-box .text { color: #eee; }
    #dialogue-box .hint {
      margin-top: 8px;
      font-size: 11px;
      color: #666;
    }
    #fps { position: fixed; top: 8px; right: 12px; font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <canvas id="game" width="512" height="384"></canvas>
  <div class="controls">
    <kbd>Arrow keys</kbd> / <kbd>WASD</kbd> move &nbsp;|&nbsp;
    <kbd>Space</kbd> interact &nbsp;|&nbsp;
    Walk up to the NPC to talk!
  </div>
  <div id="dialogue-box">
    <div class="speaker" id="dlg-speaker"></div>
    <div class="text" id="dlg-text"></div>
    <div class="hint" id="dlg-hint"></div>
  </div>
  <div id="fps"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
